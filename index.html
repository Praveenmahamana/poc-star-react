<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InsightsDB Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      body { margin: 0; background: #f1f5f9; }
      #root-fallback {
        position: fixed; inset: 0; display: flex; align-items: center;
        justify-content: center; flex-direction: column; gap: 12px;
        color: #94a3b8; font-family: sans-serif; font-size: 14px;
      }
      #root-fallback .spinner {
        width: 32px; height: 32px; border: 3px solid #1e293b;
        border-top-color: #0ea5e9; border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script type="module" src="/src/main.jsx"></script>
  </head>
  <body>
    <div id="root-fallback">
      <div class="spinner"></div>
      <span>Loading InsightsDB…</span>
      <span style="font-size:11px;color:#475569">If this persists, open the browser console (F12) for errors</span>
    </div>
    <div id="root"></div>
  </body>
</html>
